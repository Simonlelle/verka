<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add Listing - VERKA</title>
  <link href="https://fonts.googleapis.com/css2?family=Krona+One&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="min-h-screen antialiased">
  {% include '_sidebar.html' %}
  <div class="page-shell">
    <div class="page-content">
      <div class="wrap">
        <section class="card mx-auto max-w-2xl">
          <h1 class="title text-2xl md:text-3xl">Add a sale listing</h1>
          <p class="sub mt-2">Create a new product listing for the marketplace.</p>

          {% if error %}<div class="box err">{{ error }}</div>{% endif %}
          {% if submitted %}
            <div class="box ok">Listing created successfully.</div>
            {% if record_id %}
              <a class="link-btn link-btn--spaced inline-flex" href="{{ url_for('product_page', record_id=record_id) }}">View listing</a>
            {% endif %}
          {% endif %}

        {% if not submitted %}
        <form method="post">
          <div class="row">
            <label for="name">Title</label>
            <input id="name" name="name" type="text" required>
          </div>
          <div class="row">
            <label for="category">Category</label>
            <input id="category" name="category" type="text" required>
          </div>
          <div class="row">
            <label for="price">Price (EUR)</label>
            <input id="price" name="price" type="number" min="0" required>
          </div>
          <div class="row">
            <label for="condition">Condition</label>
            <input id="condition" name="condition" type="text" placeholder="New, used, like new">
          </div>
          <div class="row">
            <label for="description">Description</label>
            <textarea id="description" name="description" placeholder="Describe the item"></textarea>
          </div>
          <div class="row">
            <label for="photo_url">Image URL (required)</label>
            <input id="photo_url" name="photo_url" type="url" placeholder="https://example.com/photo.jpg" required>
          </div>
          <button type="submit" class="btn-submit">Create listing</button>
        </form>
        {% endif %}
      </section>
      </div>
    </div>
  </div>
</body>
</html>
