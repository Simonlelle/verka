<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Saved Items - VERKA</title>
  <link href="https://fonts.googleapis.com/css2?family=Krona+One&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="min-h-screen antialiased saved-page">
  {% include '_sidebar.html' %}
  <div class="page-shell">
    <div class="page-content">
      <div class="saved-header">
        <div class="saved-header-left">
          <span class="saved-eyebrow">Your collection</span>
          <h1 class="saved-title">Saved items</h1>
          <p class="saved-sub" id="savedSub">Loading...</p>
        </div>
        <button class="saved-clear-btn" id="clearAllBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/>
          </svg>
          Clear all
        </button>
      </div>

      <div class="saved-error error-box" id="savedError"></div>

      <div class="saved-loading visible" id="savedLoading">
        <div class="saved-spinner"></div>
        <p>Loading your saved items...</p>
      </div>

      <div class="saved-empty" id="savedEmpty">
        <div class="saved-empty-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/>
          </svg>
        </div>
        <h3>Nothing saved yet</h3>
        <p>Browse the marketplace and tap the bookmark icon on any product to save it here.</p>
        <a class="saved-empty-btn" href="{{ url_for('explore') }}">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="7"/><path d="m21 21-4.35-4.35"/>
          </svg>
          Browse marketplace
        </a>
      </div>

      <div class="saved-results-bar" id="savedResultsBar">
        <span class="saved-results-count"><strong id="savedCount">0</strong> saved item<span id="savedPlural">s</span></span>
      </div>

      <div class="saved-grid" id="savedGrid"></div>
    </div>
  </div>
  <script src="{{ url_for('static', filename='js/saved.js') }}"></script>
</body>
</html>
