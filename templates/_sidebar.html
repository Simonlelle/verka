<aside class="left-sidebar" aria-label="Site navigation">
  <a href="/" class="side-logo" aria-label="Home">
    <img src="{{ url_for('static', filename='images/verka logo small white.svg') }}" alt="VERKA logo" class="side-logo-img">
  </a>

  <nav class="side-nav">
    <a href="/" class="side-link" title="Home" aria-label="Home" data-path="/">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 10.5 12 3l9 7.5"/><path d="M5 9.5V21h14V9.5"/></svg>
    </a>
    <a href="/explore" class="side-link" title="Explore" aria-label="Explore" data-path="/explore">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.35-4.35"/></svg>
    </a>
    <a href="/reverse" class="side-link" title="Reverse Marketplace" aria-label="Reverse Marketplace" data-path="/reverse">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 1l4 4-4 4"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><path d="M7 23l-4-4 4-4"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
    </a>
    <a href="/saved" class="side-link" title="Saved items" aria-label="Saved items" data-path="/saved">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
    </a>
    <div class="side-add">
      <button type="button" class="side-add-btn" aria-label="Add listing" title="Add listing" aria-haspopup="true" aria-expanded="false">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14"/><path d="M5 12h14"/></svg>
      </button>
      <div class="side-add-menu" role="menu" aria-hidden="true">
        <a href="/add-listing" role="menuitem">Sale listing</a>
        <a href="/add-reverse" role="menuitem">Buy request</a>
      </div>
    </div>
  </nav>

  <a href="/settings" class="side-profile" title="Profile" aria-label="Profile">
    <span class="side-profile-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="8" r="4"/>
        <path d="M5 20c1.6-3.1 4.1-5 7-5s5.4 1.9 7 5"/>
      </svg>
    </span>
    <span class="side-profile-label">Profile</span>
  </a>
</aside>

<script>
/* Active sidebar link — runs inline so it applies before first paint */
(function() {
  var path = window.location.pathname;
  document.querySelectorAll('.side-link[data-path]').forEach(function(link) {
    var lp = link.getAttribute('data-path');
    var isActive = lp === '/' ? path === '/' : path === lp || path.startsWith(lp + '/');
    if (isActive) link.classList.add('active');
  });
})();
</script>

<script src="{{ url_for('static', filename='js/sidebar.js') }}" defer></script>
